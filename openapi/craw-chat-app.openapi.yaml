openapi: 3.0.3
info:
  title: Craw Chat App API
  version: 0.1.0
  description: |
    App-facing OpenAPI 3.x contract for IM SDK generation.
    Admin, ops, audit, IoT, and provider-health routes are intentionally excluded.
servers:
  - url: http://127.0.0.1:18090
security:
  - bearerAuth: []
tags:
  - name: auth
  - name: portal
  - name: session
  - name: realtime
  - name: device
  - name: inbox
  - name: conversation
  - name: handoff
  - name: membership
  - name: message
  - name: media
  - name: stream
  - name: rtc
paths:
  /api/v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Sign in to the tenant portal
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalLoginRequest'
      responses:
        '200':
          description: Signed-in portal session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '413':
          $ref: '#/components/responses/BadRequestError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/auth/me:
    get:
      tags: [auth]
      operationId: me
      summary: Read the current portal session
      responses:
        '200':
          description: Current portal session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalMeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/portal/home:
    get:
      tags: [portal]
      operationId: getHome
      summary: Read the tenant portal home snapshot
      security: []
      responses:
        '200':
          description: Tenant portal home snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
  /api/v1/portal/auth:
    get:
      tags: [portal]
      operationId: getAuth
      summary: Read the tenant portal sign-in snapshot
      security: []
      responses:
        '200':
          description: Tenant portal sign-in snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
  /api/v1/portal/workspace:
    get:
      tags: [portal]
      operationId: getWorkspace
      summary: Read the current tenant workspace snapshot
      responses:
        '200':
          description: Tenant workspace snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalWorkspaceView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/portal/dashboard:
    get:
      tags: [portal]
      operationId: getDashboard
      summary: Read the tenant dashboard snapshot
      responses:
        '200':
          description: Tenant dashboard snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/portal/conversations:
    get:
      tags: [portal]
      operationId: getConversations
      summary: Read the tenant conversations snapshot
      responses:
        '200':
          description: Tenant conversations snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/portal/realtime:
    get:
      tags: [portal]
      operationId: getRealtime
      summary: Read the tenant realtime snapshot
      responses:
        '200':
          description: Tenant realtime snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/portal/media:
    get:
      tags: [portal]
      operationId: getMedia
      summary: Read the tenant media snapshot
      responses:
        '200':
          description: Tenant media snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/portal/automation:
    get:
      tags: [portal]
      operationId: getAutomation
      summary: Read the tenant automation snapshot
      responses:
        '200':
          description: Tenant automation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/portal/governance:
    get:
      tags: [portal]
      operationId: getGovernance
      summary: Read the tenant governance snapshot
      responses:
        '200':
          description: Tenant governance snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSnapshot'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/sessions/resume:
    post:
      tags: [session]
      operationId: resumeSession
      summary: Resume the current app session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeSessionRequest'
      responses:
        '200':
          description: Session resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResumeView'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/sessions/disconnect:
    post:
      tags: [session]
      operationId: disconnectSession
      summary: Disconnect the current app session device route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceDeviceRequest'
      responses:
        '200':
          description: Presence snapshot after disconnect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceSnapshotView'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/presence/heartbeat:
    post:
      tags: [session]
      operationId: heartbeatPresence
      summary: Refresh device presence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceDeviceRequest'
      responses:
        '200':
          description: Presence snapshot after heartbeat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceSnapshotView'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/presence/me:
    get:
      tags: [session]
      operationId: getPresenceMe
      summary: Get current presence
      responses:
        '200':
          description: Presence snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceSnapshotView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/realtime/subscriptions/sync:
    post:
      tags: [realtime]
      operationId: syncRealtimeSubscriptions
      summary: Replace realtime subscriptions for the current device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRealtimeSubscriptionsRequest'
      responses:
        '200':
          description: Subscription snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeSubscriptionSnapshot'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/realtime/events:
    get:
      tags: [realtime]
      operationId: listRealtimeEvents
      summary: Pull realtime events for the current device
      parameters:
        - $ref: '#/components/parameters/AfterSeqQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Realtime event window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeEventWindow'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/realtime/events/ack:
    post:
      tags: [realtime]
      operationId: ackRealtimeEvents
      summary: Ack realtime events for the current device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckRealtimeEventsRequest'
      responses:
        '200':
          description: Ack state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeAckState'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/realtime/ws:
    get:
      tags: [realtime]
      operationId: openRealtimeWebsocket
      summary: Open the realtime websocket
      description: Documented for protocol visibility only. The generated SDK does not include a websocket adapter.
      responses:
        '101':
          description: WebSocket upgrade completed
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/devices/register:
    post:
      tags: [device]
      operationId: registerDevice
      summary: Register the current device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Registered device view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisteredDeviceView'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/devices/{deviceId}/sync-feed:
    get:
      tags: [device]
      operationId: getDeviceSyncFeed
      summary: Get device sync feed entries
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
        - $ref: '#/components/parameters/AfterSeqQuery'
      responses:
        '200':
          description: Device sync feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceSyncFeedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/inbox:
    get:
      tags: [inbox]
      operationId: getInbox
      summary: Get inbox entries
      responses:
        '200':
          description: Inbox entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/conversations:
    post:
      tags: [conversation]
      operationId: createConversation
      summary: Create a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/conversations/agent-dialogs:
    post:
      tags: [conversation]
      operationId: createAgentDialog
      summary: Create an agent dialog conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentDialogRequest'
      responses:
        '200':
          description: Agent dialog created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/conversations/agent-handoffs:
    post:
      tags: [conversation]
      operationId: createAgentHandoff
      summary: Create an agent handoff conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentHandoffRequest'
      responses:
        '200':
          description: Agent handoff conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/conversations/system-channels:
    post:
      tags: [conversation]
      operationId: createSystemChannel
      summary: Create a system channel conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSystemChannelRequest'
      responses:
        '200':
          description: System channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/conversations/{conversationId}:
    get:
      tags: [conversation]
      operationId: getConversationSummary
      summary: Get projected conversation summary
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Conversation summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSummaryView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/conversations/{conversationId}/agent-handoff:
    get:
      tags: [handoff]
      operationId: getAgentHandoffState
      summary: Get current agent handoff state
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Agent handoff state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHandoffStateView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/conversations/{conversationId}/agent-handoff/accept:
    post:
      tags: [handoff]
      operationId: acceptAgentHandoff
      summary: Accept an agent handoff
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Agent handoff state after accept
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHandoffStateView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/agent-handoff/resolve:
    post:
      tags: [handoff]
      operationId: resolveAgentHandoff
      summary: Resolve an accepted agent handoff
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Agent handoff state after resolve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHandoffStateView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/agent-handoff/close:
    post:
      tags: [handoff]
      operationId: closeAgentHandoff
      summary: Close an agent handoff
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Agent handoff state after close
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHandoffStateView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/members:
    get:
      tags: [membership]
      operationId: listConversationMembers
      summary: List members in a conversation
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Conversation members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembersResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/conversations/{conversationId}/members/add:
    post:
      tags: [membership]
      operationId: addConversationMember
      summary: Add a member to a conversation
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConversationMemberRequest'
      responses:
        '200':
          description: Added conversation member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMember'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/conversations/{conversationId}/members/remove:
    post:
      tags: [membership]
      operationId: removeConversationMember
      summary: Remove a member from a conversation
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveConversationMemberRequest'
      responses:
        '200':
          description: Removed conversation member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMember'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/members/transfer-owner:
    post:
      tags: [membership]
      operationId: transferConversationOwner
      summary: Transfer conversation ownership
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferConversationOwnerRequest'
      responses:
        '200':
          description: Ownership transfer result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferConversationOwnerResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/members/change-role:
    post:
      tags: [membership]
      operationId: changeConversationMemberRole
      summary: Change a conversation member role
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeConversationMemberRoleRequest'
      responses:
        '200':
          description: Member role change result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeConversationMemberRoleResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/members/leave:
    post:
      tags: [membership]
      operationId: leaveConversation
      summary: Leave a conversation
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Leaving member view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMember'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/conversations/{conversationId}/read-cursor:
    get:
      tags: [conversation]
      operationId: getConversationReadCursor
      summary: Get the current member read cursor
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      responses:
        '200':
          description: Conversation read cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationReadCursorView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    post:
      tags: [conversation]
      operationId: updateConversationReadCursor
      summary: Update the current member read cursor
      parameters:
        - $ref: '#/components/parameters/ConversationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReadCursorRequest'
      responses:
        '200':
          description: Updated conversation read cursor
          content:
