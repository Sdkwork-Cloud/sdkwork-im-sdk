components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ConversationIdPath:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
    MessageIdPath:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    MediaAssetIdPath:
      name: mediaAssetId
      in: path
      required: true
      schema:
        type: string
    StreamIdPath:
      name: streamId
      in: path
      required: true
      schema:
        type: string
    RtcSessionIdPath:
      name: rtcSessionId
      in: path
      required: true
      schema:
        type: string
    AfterSeqQuery:
      name: afterSeq
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
    AfterFrameSeqQuery:
      name: afterFrameSeq
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
    ExpiresInSecondsQuery:
      name: expiresInSeconds
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
  responses:
    BadRequestError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedError:
      description: Bearer authentication failed or is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ForbiddenError:
      description: Caller is not allowed to access the resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFoundError:
      description: Resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ConflictError:
      description: Request conflicts with the current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ServiceUnavailableError:
      description: Required runtime capability or provider is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    StringMap:
      type: object
      additionalProperties:
        type: string
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    PortalSnapshot:
      type: object
      additionalProperties: true
    PortalLoginRequest:
      type: object
      required: [tenantId, login, password]
      properties:
        tenantId:
          type: string
        login:
          type: string
        password:
          type: string
        deviceId:
          type: string
        sessionId:
          type: string
        clientKind:
          type: string
    PortalUserView:
      type: object
      required:
        - id
        - login
        - name
        - role
        - email
        - actorKind
        - clientKind
        - permissions
      properties:
        id:
          type: string
        login:
          type: string
        name:
          type: string
        role:
          type: string
        email:
          type: string
          format: email
        actorKind:
          type: string
        clientKind:
          type: string
        permissions:
          type: array
          items:
            type: string
    PortalWorkspaceView:
      type: object
      required:
        - name
        - slug
        - tier
        - region
        - supportPlan
        - seats
        - activeBrands
        - uptime
      properties:
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
        region:
          type: string
        supportPlan:
          type: string
        seats:
          type: integer
          format: int32
        activeBrands:
          type: integer
          format: int32
        uptime:
          type: string
    PortalLoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresAt, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/PortalUserView'
        workspace:
          $ref: '#/components/schemas/PortalWorkspaceView'
    PortalMeResponse:
      type: object
      required: [tenantId, user]
      properties:
        tenantId:
          type: string
        user:
          $ref: '#/components/schemas/PortalUserView'
        workspace:
          $ref: '#/components/schemas/PortalWorkspaceView'
